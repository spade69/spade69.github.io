<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spade69's Pages</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --primary: #38bdf8;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --hover: #0ea5e9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: -0.5px;
  }

  header p {
    margin-top: 0.5rem;
    color: var(--muted);
    font-size: 0.95rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.25rem;
    width: 100%;
    max-width: 640px;
  }

  a.card {
    display: block;
    text-decoration: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  }

  a.card:hover {
    border-color: var(--hover);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(14,165,233,0.15);
  }

  .card-icon {
    font-size: 2rem;
    margin-bottom: 0.75rem;
  }

  .card-title {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.4rem;
  }

  .card-desc {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .card-link {
    display: inline-block;
    margin-top: 1rem;
    font-size: 0.8rem;
    color: var(--primary);
  }

  footer {
    margin-top: 3rem;
    color: var(--muted);
    font-size: 0.8rem;
    text-align: center;
  }

  footer a {
    color: var(--muted);
    text-decoration: none;
  }

  footer a:hover { color: var(--primary); }
</style>
</head>
<body>

<header>
  <h1>Spade69's Pages</h1>
  <p>个人页面导航</p>
</header>

<div class="grid">

  <a class="card" href="/travel-plan/">
    <div class="card-icon">✈️</div>
    <div class="card-title">旅行攻略</div>
    <div class="card-desc">AI 生成的旅行计划与行程指南，涵盖景点、美食、住宿与预算。</div>
    <div class="card-link">spade69.github.io/travel-plan →</div>
  </a>

  <a class="card" href="/daily-report/">
    <div class="card-icon">📊</div>
    <div class="card-title">每日财经报告</div>
    <div class="card-desc">AI 生成的每日个人财经分析与市场动态报告。</div>
    <div class="card-link">spade69.github.io/daily-report →</div>
  </a>

</div>

<footer>
  <a href="https://github.com/spade69" target="_blank">github.com/spade69</a>
</footer>

</body>
</html>
