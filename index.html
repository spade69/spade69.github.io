<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spade69</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:    #18181B;
    --secondary:  #3F3F46;
    --accent:     #2563EB;
    --accent-hover: #1D4ED8;
    --bg:         #FAFAFA;
    --fg:         #09090B;
    --muted:      #71717A;
    --border:     #E4E4E7;
    --card:       #FFFFFF;
    --shadow:     0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
    --shadow-hover: 0 4px 8px rgba(0,0,0,.08), 0 12px 32px rgba(37,99,235,.12);
    --radius:     14px;
    --transition: 220ms cubic-bezier(.4,0,.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 1.25rem;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 640px;
    padding: 4rem 0 3rem;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity .5s ease, transform .5s ease;
  }

  header.visible { opacity: 1; transform: translateY(0); }

  .avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.25rem;
  }

  .avatar svg { color: #fff; }

  h1 {
    font-family: 'Archivo', sans-serif;
    font-size: clamp(1.75rem, 4vw, 2.25rem);
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--fg);
    margin-bottom: .4rem;
  }

  .subtitle {
    font-size: .95rem;
    color: var(--muted);
    font-weight: 400;
    line-height: 1.6;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1rem;
    width: 100%;
    max-width: 640px;
    margin-bottom: 3rem;
  }

  /* ── Card ── */
  a.card {
    display: block;
    text-decoration: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    opacity: 0;
    transform: translateY(20px);
  }

  a.card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  a.card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-hover);
    border-color: var(--accent);
  }

  a.card:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #EFF6FF;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    color: var(--accent);
    transition: background var(--transition);
  }

  a.card:hover .card-icon { background: #DBEAFE; }

  .card-title {
    font-family: 'Archivo', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--fg);
    margin-bottom: .35rem;
  }

  .card-desc {
    font-size: .85rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 1.1rem;
  }

  .card-arrow {
    display: inline-flex;
    align-items: center;
    gap: .3rem;
    font-size: .8rem;
    font-weight: 500;
    color: var(--accent);
    transition: gap var(--transition);
  }

  a.card:hover .card-arrow { gap: .5rem; }

  /* ── Footer ── */
  footer {
    margin-top: auto;
    padding: 1.5rem 0 2.5rem;
    text-align: center;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .5s ease .3s, transform .5s ease .3s;
  }

  footer.visible { opacity: 1; transform: translateY(0); }

  footer a {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    font-size: .82rem;
    color: var(--muted);
    text-decoration: none;
    transition: color var(--transition);
  }

  footer a:hover { color: var(--fg); }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    header, a.card, footer {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
    }
  }
</style>
</head>
<body>

<header>
  <div class="avatar" aria-hidden="true">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </svg>
  </div>
  <h1>Spade69</h1>
  <p class="subtitle">个人主页 · 旅行攻略 · 财经报告</p>
</header>

<main class="grid" role="main">

  <a class="card" href="/travel-plan/" aria-label="旅行攻略页面">
    <div class="card-icon" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.23 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.5A16 16 0 0 0 15.5 16.09l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 17z"/>
      </svg>
    </div>
    <div class="card-title">旅行攻略</div>
    <p class="card-desc">AI 生成的行程指南，涵盖景点、美食、住宿与预算规划。</p>
    <span class="card-arrow" aria-hidden="true">
      前往查看
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </span>
  </a>

  <a class="card" href="/daily-report/" aria-label="每日财经报告页面">
    <div class="card-icon" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
    </div>
    <div class="card-title">每日财经报告</div>
    <p class="card-desc">AI 生成的每日个人财经分析与市场动态报告。</p>
    <span class="card-arrow" aria-hidden="true">
      前往查看
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </span>
  </a>

</main>

<footer>
  <a href="https://github.com/spade69" target="_blank" rel="noopener" aria-label="GitHub 主页">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
    </svg>
    github.com/spade69
  </a>
</footer>

<script>
  const observer = new IntersectionObserver(
    (entries) => entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } }),
    { threshold: 0.1 }
  );
  document.querySelectorAll('header, .card, footer').forEach(el => observer.observe(el));

  // Stagger card entrance
  document.querySelectorAll('.card').forEach((el, i) => {
    el.style.transitionDelay = `${i * 80}ms`;
  });
</script>
</body>
</html>
